name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
      - run: cargo clippy --workspace -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
      - run: cargo test --workspace

  changes:
    name: Detect dependency changes
    runs-on: ubuntu-latest
    outputs:
      deps: ${{ steps.filter.outputs.deps }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            deps:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/*/Cargo.toml'

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.deps == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  embed-build-matrix:
    name: embed-build (${{ matrix.target }} / ${{ matrix.variant }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-apple-darwin,        variant: default,  os: macos-14 }
          - { target: aarch64-apple-darwin,       variant: default,  os: macos-14 }
          - { target: x86_64-unknown-linux-gnu,   variant: default,  os: ubuntu-latest }
          - { target: x86_64-unknown-linux-gnu,   variant: baseline, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu,  variant: default,  os: ubuntu-latest, cross: true }
          - { target: x86_64-pc-windows-msvc,     variant: default,  os: windows-latest }
          - { target: aarch64-pc-windows-msvc,    variant: default,  os: windows-latest }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: embed-${{ matrix.target }}-${{ matrix.variant }}
      - name: Install cross (linux-arm64 only)
        if: matrix.cross
        run: cargo install cross --locked
      - name: Build aionui-runtime with embedded bun
        shell: bash
        env:
          AIONUI_EMBED_BUN: "1"
          BUN_VARIANT: ${{ matrix.variant }}
        run: |
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            cross build --release -p aionui-runtime --target ${{ matrix.target }}
          else
            cargo build --release -p aionui-runtime --target ${{ matrix.target }}
          fi
